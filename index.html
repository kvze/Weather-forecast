<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="city-search">
            <input type="text" class="city-input" placeholder="Введите город">
            <button class="city-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="1rem" height="1rem" viewBox="0 0 24 24" fill="none">
                    <path d="M15.7955 15.8111L21 21M18 10.5C18 14.6421 14.6421 18 10.5 18C6.35786 18 3 14.6421 3 10.5C3 6.35786 6.35786 3 10.5 3C14.6421 3 18 6.35786 18 10.5Z" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
            </button>
        </div>
        <div class="weather">
            <div class="city-name">
                Москва
            </div>
            <div class="temperature">
                20°C
            </div>
            <div class="weather-description">
                Облачно
            </div>
            <div class="weather-icon">
                <img src="img/weather-icon.png" alt="weather-icon">
            </div>
            <div class="weather-wind">
            </div>
            <div class="weather-humidity">
            </div>
            <div class="weather-pressure">
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
